[alembic]
script_location = alembic

; This value is overridden in alembic/env.py from the DATABASE_URL env var.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic
qualname = %(qualname)s
handlers =
level = INFO

[handlers]
keys = console
qualname = %(qualname)s
handlers = console
level = INFO

[formatters]
keys = generic
format = %(levelname)-5.5s [%(name)s] %(message)s

[logger_root]
level = INFO
handlers = console

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s

[handler_console]
class = StreamHandler
level = NOTSET
formatter = generic
args = (sys.stdout,)