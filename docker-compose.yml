services:
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
    #  - postgres_data:/var/lib/postgresql/data

#  redis:
#    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - postgres
    #  - redis

  worker:
    build:
      context: ./backend
    env_file:
      - ./.env
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - postgres
   #   - redis
  #  command: celery -A app.worker.celery_app worker --loglevel=info

  frontend:
    build:
      context: ./frontend
    env_file:
      - ./.env
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:

